kind = "web"
previewPath = "/"
title = "مسابقة إسلامية"
version = "1.0.0"
id = "artifacts/islamic-quiz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20281

[services.development]
run = "pnpm --filter @workspace/islamic-quiz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/islamic-quiz", "run", "build" ]
publicDir = "artifacts/islamic-quiz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20281"
BASE_PATH = "/"
